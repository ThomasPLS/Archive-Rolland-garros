<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roland Garros — Tableaux</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --clay: #b83224; --clay-dark: #8a1f16; --green: #1b5e35; --gold: #c49a3c;
      --ink: #18100a; --muted: #7a6555; --border: #e2d0c4; --clay-pale: #fdf5f0;
      --player-border: #e0cdc4; --winner-bg: #f0faf4; --winner-border: #a8d4b5;
      --winner-text: #1b5e35; --conn: #cbb6a8;
      --mh: 36px; /* match slot height */
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--clay-pale); min-height: 100vh; color: var(--ink); }

    /* ── HEADER ── */
    header { background: var(--clay); padding: 28px 40px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; position: relative; overflow: hidden; }
    header::after { content:''; position:absolute; inset:0; background: repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 21px); pointer-events:none; }
    .htitle { position:relative; z-index:1; }
    .htitle .tag { display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:6px; }
    .htitle h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,4vw,2.4rem); font-weight:900; color:#fff; line-height:1.1; }
    .htitle h1 em { font-style:italic; color:rgba(255,255,255,.65); }
    .hcontrols { position:relative; z-index:1; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:9px 18px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
    .btn-primary { background:var(--green); color:#fff; }
    .btn-primary:hover { background:#236640; }
    .btn-secondary { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); }
    .btn-secondary:hover { background:rgba(255,255,255,.25); }
    .mode-badge { display:inline-flex; align-items:center; padding:5px 12px; border-radius:20px; font-size:.75rem; font-weight:500; }
    .mode-badge.reader { background:rgba(255,255,255,.15); color:rgba(255,255,255,.8); }
    .mode-badge.editor { background:var(--gold); color:#2a1a00; }

    /* ── TABS ── */
    .tabs-bar { background:var(--clay-dark); display:flex; align-items:center; padding:0 32px; overflow-x:auto; scrollbar-width:none; }
    .tabs-bar::-webkit-scrollbar { display:none; }
    .tab { display:flex; align-items:center; gap:8px; padding:13px 18px; font-size:.85rem; font-weight:500; color:rgba(255,255,255,.5); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:color .15s,border-color .15s; user-select:none; flex-shrink:0; }
    .tab:hover { color:rgba(255,255,255,.8); }
    .tab.active { color:#fff; border-bottom-color:var(--gold); }
    .tab .xtab { width:17px; height:17px; border-radius:50%; background:rgba(255,255,255,.15); border:none; color:rgba(255,255,255,.7); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .tab .xtab:hover { background:rgba(255,255,255,.3); color:#fff; }
    .add-tab-btn { padding:9px 15px; background:transparent; border:1px dashed rgba(255,255,255,.3); color:rgba(255,255,255,.55); border-radius:6px; font-family:'DM Sans',sans-serif; font-size:.82rem; cursor:pointer; margin-left:10px; display:flex; align-items:center; gap:6px; transition:all .15s; white-space:nowrap; flex-shrink:0; }
    .add-tab-btn:hover { background:rgba(255,255,255,.12); color:#fff; }

    /* ── GENDER BAR ── */
    .gender-bar { background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 32px; }
    .gbtn { padding:12px 24px; font-size:.85rem; font-weight:500; color:var(--muted); background:none; border:none; border-bottom:3px solid transparent; cursor:pointer; transition:color .15s,border-color .15s; }
    .gbtn.active { color:var(--clay); border-bottom-color:var(--clay); }

    /* ── BRACKET LAYOUT ── */
    .bracket-area { padding:24px 32px 60px; overflow-x:auto; }
    .bracket-meta { display:flex; align-items:center; margin-bottom:16px; gap:12px; }
    .bracket-meta .edition-label { font-family:'Playfair Display',serif; font-size:1.1rem; font-style:italic; color:var(--muted); }
    .btn-clear { margin-left:auto; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:.78rem; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--muted); cursor:pointer; transition:all .15s; }
    .btn-clear:hover { border-color:var(--clay); color:var(--clay); }
    .hint { font-size:.7rem; color:var(--muted); font-style:italic; margin-bottom:16px; }

    /* ── THE BRACKET ── */
    /*
      Technique : chaque colonne de round est un flex column.
      Chaque "slot" (espace occupé par un match) est un flex avec align-items:center.
      Le match est centré verticalement dans son slot.
      Les connecteurs sont des pseudo-éléments CSS sur le slot.
      Aucun calcul JS de pixels.
    */
    .bracket { display:flex; align-items:flex-start; gap:0; min-width:max-content; }

    .round-col { display:flex; flex-direction:column; width:240px; flex-shrink:0; }
    .round-label { font-size:.62rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:center; padding:0 0 10px; white-space:nowrap; }

    /* Slot = espace vertical que prend 1 match dans cette colonne */
    .slot {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      position: relative;
      /* Connecteur droit (vers le gap) */
    }

    /* Ligne horizontale sortant à droite du match */
    .slot::after {
      content: '';
      position: absolute;
      right: -24px;
      top: 50%;
      width: 24px;
      height: 1.5px;
      background: var(--conn);
    }
    /* Pas de ligne sur la dernière colonne */
    .round-col:last-child .slot::after,
    .champ-col .slot::after { display:none; }

    /* Connecteur vertical dans le gap : sur les slots pairs (haut du duo) */
    /* On utilise un div .gap-col entre chaque round */
    .gap-col { width:48px; flex-shrink:0; display:flex; flex-direction:column; }
    .gap-cell {
      flex:1;
      position:relative;
    }
    /* Ligne verticale reliant les deux horizontales */
    .gap-cell::before {
      content:'';
      position:absolute;
      left:0; /* = où arrivent les lignes horizontales */
      top:25%; bottom:25%;
      width:1.5px;
      background:var(--conn);
    }
    /* Ligne horizontale vers la droite */
    .gap-cell::after {
      content:'';
      position:absolute;
      left:0; top:50%;
      width:100%;
      height:1.5px;
      background:var(--conn);
    }
    /* Pour les gap-cells impaires (haut), la verticale part du milieu vers le bas */
    .gap-cell.top::before { top:50%; bottom:0; }
    /* Pour les gap-cells paires (bas), la verticale part du haut vers le milieu */
    .gap-cell.bot::before { top:0; bottom:50%; }

    /* ── MATCH CARD ── */
    .match {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--player-border);
      margin: 4px 0;
    }
    .match.has-video { border-color: #e8a09a; background: rgba(184,50,36,.04); }
    .match.has-video .pslot { border-color: #e8a09a; }

    .pslot { display:flex; align-items:center; min-height:var(--mh); border:none; border-bottom:1px solid var(--border); overflow:hidden; transition:background .12s; }
    .pslot:last-of-type { border-bottom:none; }
    .pslot.winner { background:var(--winner-bg); }
    .pslot input { flex:1; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:.78rem; color:var(--ink); padding:5px 7px; outline:none; min-width:0; }
    .pslot.winner input { color:var(--winner-text); font-weight:500; }
    .pslot input::placeholder { color:#c8b4a8; font-style:italic; }

    .match-footer { display:flex; align-items:center; gap:4px; padding:3px 4px; background:#faf5f2; border-top:1px solid var(--border); }
    .stars { display:flex; gap:1px; flex-shrink:0; }
    .stars .s { font-size:11px; color:#ddd0c8; cursor:pointer; user-select:none; transition:color .1s; line-height:1; }
    .stars .s.on { color:var(--gold); }
    .score-inp { flex:1; min-width:0; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:.7rem; color:var(--ink); padding:2px 4px; outline:none; }
    .score-inp::placeholder { color:#c8b4a8; font-style:italic; }
    .video-inp { flex:1.2; min-width:0; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:.68rem; color:var(--muted); padding:2px 4px; outline:none; }
    .video-inp::placeholder { color:#c8b4a8; font-style:italic; }
    .video-btn { height:20px; padding:0 6px; background:var(--clay); border:none; border-radius:3px; color:#fff; font-size:.68rem; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .15s; }
    .video-btn:hover { background:var(--clay-dark); }
    .video-btn:disabled { background:#cbb6a8; cursor:default; opacity:.6; }

    /* ── CHAMPION ── */
    .champ-col { padding-left:24px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .champ-lbl { font-size:.62rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:8px; }
    .champ-box { background:#fffdf0; border:1.5px solid var(--gold); border-radius:10px; padding:14px 18px; width:220px; display:flex; flex-direction:column; align-items:center; gap:6px; }
    .champ-box input { width:100%; border:none; background:transparent; font-family:'Playfair Display',serif; font-size:.95rem; font-weight:700; text-align:center; outline:none; color:var(--ink); }
    .champ-box input::placeholder { color:#c4a060; font-style:italic; font-size:.82rem; }

    /* ── MODE LECTEUR ── */
    body.reader-mode input { pointer-events:none; user-select:none; }
    body.reader-mode .pslot:has(input[value=""]) { background:#f0e8e3; }
    body.reader-mode .match-footer { opacity:.8; }
    body.reader-mode .stars .s { cursor:default; pointer-events:none; }
    body.reader-mode .stars:not(:has(.s.on)) { display:none; }
    body.reader-mode .hcontrols .btn-editor-only { display:none; }
    body.reader-mode .btn-clear { display:none; }
    body.reader-mode .tab .xtab { display:none; }
    body.reader-mode .add-tab-btn { display:none; }
    body.reader-mode .hint { display:none; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
    .empty-state h2 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--ink); margin-bottom:12px; }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(20,10,5,.55); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(3px); }
    .modal-box { background:#fff; border-radius:14px; padding:36px 32px 28px; width:320px; box-shadow:0 20px 60px rgba(0,0,0,.25); text-align:center; }
    .modal-box h2 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--ink); margin-bottom:6px; }
    .modal-box p { font-size:.82rem; color:var(--muted); margin-bottom:20px; }
    .modal-box input { width:100%; border:1.5px solid var(--border); border-radius:7px; padding:10px 14px; font-family:'DM Sans',sans-serif; font-size:.95rem; outline:none; margin-bottom:10px; transition:border-color .15s; text-align:center; letter-spacing:3px; }
    .modal-box input:focus { border-color:var(--clay); }
    .modal-err { color:var(--clay); font-size:.78rem; min-height:18px; margin-bottom:10px; }
    .btn-modal { width:100%; padding:10px; border-radius:7px; font-size:.9rem; }
    .btn-cancel { margin-top:8px; background:none; border:none; color:var(--muted); font-size:.8rem; cursor:pointer; text-decoration:underline; }

    footer { text-align:center; padding:18px; font-size:.73rem; color:var(--muted); border-top:1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <div class="htitle">
    <span class="tag">Stade Roland Garros · Paris</span>
    <h1>Roland Garros <em>— Les Tableaux</em></h1>
  </div>
  <div class="hcontrols">
    <span class="mode-badge reader" id="mode-badge">👁 Lecture seule</span>
    <button class="btn btn-secondary" onclick="toggleEditorMode()" id="btn-mode-toggle">🔓 Mode éditeur</button>
    <button class="btn btn-secondary btn-editor-only" onclick="exportData()">⬇ Exporter</button>
    <label class="btn btn-secondary btn-editor-only" style="cursor:pointer">⬆ Importer<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
    <button class="btn btn-primary btn-editor-only" onclick="addYear()">+ Ajouter une année</button>
  </div>
</header>

<div class="tabs-bar" id="tabs-bar"></div>
<div class="gender-bar" id="gender-bar" style="display:none">
  <button class="gbtn active" id="gbtn-men" onclick="switchGender('men')">Tableau Messieurs</button>
  <button class="gbtn" id="gbtn-women" onclick="switchGender('women')">Tableau Dames</button>
</div>
<div id="main-content"></div>

<div class="modal-overlay" id="pwd-modal" style="display:none">
  <div class="modal-box">
    <h2>Mode Éditeur</h2>
    <p>Entrez le mot de passe pour modifier les tableaux.</p>
    <input type="password" id="pwd-input" placeholder="••••" onkeydown="if(event.key==='Enter')checkPassword()"/>
    <div class="modal-err" id="pwd-err"></div>
    <button class="btn btn-primary btn-modal" onclick="checkPassword()">Valider</button>
    <br><button class="btn-cancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<footer>Roland Garros Tableaux Archive · Données sauvegardées dans votre navigateur · Double-clic sur un joueur pour le marquer vainqueur</footer>

<script>
const ROUNDS = [
  { key:'r1', label:'1er Tour',     n:64 },
  { key:'r2', label:'2e Tour',      n:32 },
  { key:'r3', label:'3e Tour',      n:16 },
  { key:'r4', label:'4e Tour',      n:8  },
  { key:'qf', label:'Quarts',       n:4  },
  { key:'sf', label:'Demi-finales', n:2  },
  { key:'f',  label:'Finale',       n:1  },
];

const SK = 'rg_v4'; // même clé localStorage → tes données sont préservées

let ST   = loadST();
let curY = null;
let curG = 'men';

function loadST() {
  try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : { years:[] }; }
  catch { return { years:[] }; }
}
function saveST() { collectDOM(); localStorage.setItem(SK, JSON.stringify(ST)); }
function getY(id) { return ST.years.find(y => y.id === id); }

function emptyBracket() {
  const b = { champion:'' };
  ROUNDS.forEach(r => {
    b[r.key] = Array.from({ length: r.n }, () => ({ p1:'', p2:'', w:null, score:'', video:'', stars:0 }));
  });
  return b;
}

// ── ACTIONS ──
function addYear() {
  const yr = prompt("Entrez l'année (ex: 2023):", '');
  if (!yr || isNaN(+yr)) return;
  const id = 'y' + Date.now();
  ST.years.push({ id, year:+yr, men:emptyBracket(), women:emptyBracket() });
  saveST(); renderAll(); switchTab(id);
}
function deleteYear(id) {
  if (!confirm('Supprimer ce tableau ?')) return;
  ST.years = ST.years.filter(y => y.id !== id);
  if (curY === id) curY = ST.years.length ? ST.years[ST.years.length-1].id : null;
  saveST(); renderAll();
}
function switchTab(id) { collectDOM(); curY = id; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id===id)); renderContent(); }
function switchGender(g) { collectDOM(); curG = g; document.getElementById('gbtn-men').classList.toggle('active',g==='men'); document.getElementById('gbtn-women').classList.toggle('active',g==='women'); renderContent(); }
function clearBracket() { if(!confirm('Effacer toutes les données de ce tableau ?')) return; const y=getY(curY); if(!y) return; y[curG]=emptyBracket(); saveST(); renderContent(); }

// ── COLLECT DOM → STATE ──
function collectDOM() {
  if (!curY) return;
  const y = getY(curY); if (!y) return;
  const b = y[curG];
  ROUNDS.forEach(r => {
    b[r.key].forEach((m,i) => {
      const el = document.getElementById(`m_${r.key}_${i}`);
      if (!el) return;
      m.p1    = el.querySelector('[data-p1]')?.value || '';
      m.p2    = el.querySelector('[data-p2]')?.value || '';
      m.score = el.querySelector('[data-score]')?.value || '';
      m.video = el.querySelector('[data-video]')?.value || '';
    });
  });
  const ce = document.getElementById('champion-inp');
  if (ce) b.champion = ce.value;
}

// ── RENDER ──
function renderAll() { renderTabs(); renderContent(); }

function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  ST.years.forEach(y => {
    const t = document.createElement('div');
    t.className = 'tab' + (y.id===curY?' active':'');
    t.dataset.id = y.id;
    t.innerHTML = `<span>${y.year}</span><button class="xtab" onclick="event.stopPropagation();deleteYear('${y.id}')">×</button>`;
    t.addEventListener('click', () => switchTab(y.id));
    bar.appendChild(t);
  });
  const ab = document.createElement('button');
  ab.className='add-tab-btn'; ab.textContent='+ Nouvelle année'; ab.onclick=addYear;
  bar.appendChild(ab);
}

function renderContent() {
  const mc = document.getElementById('main-content');
  const gb = document.getElementById('gender-bar');
  if (!curY || !ST.years.length) {
    gb.style.display='none';
    mc.innerHTML=`<div class="empty-state"><h2>Aucun tableau pour l'instant</h2><p style="margin-bottom:24px">Cliquez sur <strong>+ Ajouter une année</strong> pour saisir les résultats d'une édition.</p><button class="btn btn-primary" onclick="addYear()">+ Ajouter une année</button></div>`;
    return;
  }
  gb.style.display='flex';
  const y = getY(curY); if (!y) return;
  const b = y[curG];

  mc.innerHTML='';
  const area = document.createElement('div');
  area.className='bracket-area';

  area.innerHTML=`<div class="bracket-meta">
    <span class="edition-label">Roland Garros ${y.year} — ${curG==='men'?'Messieurs':'Dames'}</span>
    <button class="btn-clear" onclick="clearBracket()">Effacer</button>
  </div>
  <p class="hint">Double-clic sur un nom pour le marquer vainqueur et le propager au tour suivant.</p>`;

  const bracket = document.createElement('div');
  bracket.className = 'bracket';

  // Build each round column + gap column
  ROUNDS.forEach((round, ri) => {
    const col = document.createElement('div');
    col.className = 'round-col';

    const lbl = document.createElement('div');
    lbl.className = 'round-label';
    lbl.textContent = round.label;
    col.appendChild(lbl);

    // Each match gets a "slot" — slots all have equal flex:1 so they divide the column evenly
    b[round.key].forEach((match, idx) => {
      const slot = document.createElement('div');
      slot.className = 'slot';
      // Hide the connector line for the last round (Finale)
      if (ri === ROUNDS.length - 1) slot.style.setProperty('--no-conn','1');

      const card = buildMatchCard(match, round.key, idx, ri);
      slot.appendChild(card);
      col.appendChild(slot);
    });

    bracket.appendChild(col);

    // Gap column between rounds
    if (ri < ROUNDS.length - 1) {
      const gap = buildGapCol(round.n);
      bracket.appendChild(gap);
    }
  });

  // Champion
  const champ = document.createElement('div');
  champ.className = 'champ-col';
  champ.innerHTML = `<div class="champ-lbl">🏆 Champion·ne</div>
    <div class="champ-box">
      <div style="font-size:24px">🏆</div>
      <input id="champion-inp" type="text" placeholder="Vainqueur…" value="${esc(b.champion||'')}" oninput="saveST()"/>
    </div>`;
  bracket.appendChild(champ);

  area.appendChild(bracket);
  mc.appendChild(area);
}

function buildGapCol(n) {
  // n = number of matches in the LEFT round
  // We need n/2 pairs → n gap-cells total (top+bot for each pair)
  const gap = document.createElement('div');
  gap.className = 'gap-col';
  for (let i = 0; i < n; i++) {
    const cell = document.createElement('div');
    cell.className = 'gap-cell ' + (i % 2 === 0 ? 'top' : 'bot');
    gap.appendChild(cell);
  }
  return gap;
}

function buildMatchCard(match, rk, idx, ri) {
  const w1 = match.w === '1';
  const w2 = match.w === '2';
  const stars = match.stars || 0;

  const card = document.createElement('div');
  card.className = 'match' + (match.video?.trim() ? ' has-video' : '');
  card.id = `m_${rk}_${idx}`;

  // Player 1
  const ps1 = document.createElement('div');
  ps1.className = 'pslot' + (w1?' winner':'');
  ps1.id = `ps_${rk}_${idx}_1`;
  const inp1 = document.createElement('input');
  inp1.type='text'; inp1.setAttribute('data-p1',''); inp1.placeholder='Joueur·se'; inp1.value=match.p1||'';
  inp1.oninput = () => saveST();
  ps1.appendChild(inp1);
  ps1.addEventListener('dblclick', () => markWinner(rk, idx, 1, ri));
  card.appendChild(ps1);

  // Player 2
  const ps2 = document.createElement('div');
  ps2.className = 'pslot' + (w2?' winner':'');
  ps2.id = `ps_${rk}_${idx}_2`;
  const inp2 = document.createElement('input');
  inp2.type='text'; inp2.setAttribute('data-p2',''); inp2.placeholder='Joueur·se'; inp2.value=match.p2||'';
  inp2.oninput = () => saveST();
  ps2.appendChild(inp2);
  ps2.addEventListener('dblclick', () => markWinner(rk, idx, 2, ri));
  card.appendChild(ps2);

  // Footer: stars + score + video
  const footer = document.createElement('div');
  footer.className = 'match-footer';

  const starsDiv = document.createElement('div');
  starsDiv.className = 'stars';
  starsDiv.id = `stars_${rk}_${idx}`;
  for (let n=1;n<=5;n++) {
    const s = document.createElement('span');
    s.className = 's' + (stars>=n?' on':'');
    s.dataset.n = n;
    s.textContent = '★';
    s.onclick = () => setStar(rk, idx, n);
    starsDiv.appendChild(s);
  }
  footer.appendChild(starsDiv);

  const scoreInp = document.createElement('input');
  scoreInp.className='score-inp'; scoreInp.type='text'; scoreInp.setAttribute('data-score','');
  scoreInp.placeholder='Score…'; scoreInp.value=match.score||'';
  scoreInp.oninput=()=>saveST();
  footer.appendChild(scoreInp);

  const videoInp = document.createElement('input');
  videoInp.className='video-inp'; videoInp.type='text'; videoInp.setAttribute('data-video','');
  videoInp.placeholder='Vidéo…'; videoInp.value=match.video||'';
  videoInp.oninput=()=>{ updateVideoBtn(videoInp); };
  footer.appendChild(videoInp);

  const videoBtn = document.createElement('button');
  videoBtn.className='video-btn'; videoBtn.textContent='▶';
  videoBtn.disabled = !match.video?.trim();
  videoBtn.title='Voir la vidéo';
  videoBtn.onclick=()=>openVideo(videoInp.value);
  footer.appendChild(videoBtn);

  // Store ref for updateVideoBtn
  videoInp._btn = videoBtn;
  videoInp._card = card;

  card.appendChild(footer);
  return card;
}

// ── WINNER ──
function markWinner(rk, idx, player, ri) {
  collectDOM();
  const y = getY(curY); if (!y) return;
  const b = y[curG];
  const match = b[rk][idx];
  const ps = String(player);
  const toggling = match.w === ps;
  match.w = toggling ? null : ps;

  if (!toggling && ri < ROUNDS.length - 1) {
    const nextRound = ROUNDS[ri+1];
    const nextIdx = Math.floor(idx/2);
    const slot = idx%2===0 ? 'p1' : 'p2';
    match.w === null ? null : (b[nextRound.key][nextIdx][slot] = player===1 ? match.p1 : match.p2);
    // Redo after setting w
    b[nextRound.key][nextIdx][slot] = player===1 ? match.p1 : match.p2;
  }

  saveST(); renderContent();
}

// ── STARS ──
function setStar(rk, idx, n) {
  if (!isEditor) return;
  collectDOM();
  const y = getY(curY); if (!y) return;
  const m = y[curG][rk][idx];
  m.stars = (m.stars === n) ? 0 : n;
  saveST();
  const row = document.getElementById(`stars_${rk}_${idx}`);
  if (row) row.querySelectorAll('.s').forEach(s => s.classList.toggle('on', +s.dataset.n <= m.stars));
}

// ── VIDEO ──
function openVideo(url) {
  if (!url) return;
  window.open(url.startsWith('http') ? url : 'https://'+url, '_blank', 'noopener');
}
function updateVideoBtn(inp) {
  if (inp._btn) inp._btn.disabled = !inp.value.trim();
  if (inp._card) inp._card.classList.toggle('has-video', !!inp.value.trim());
  saveST();
}

// ── EDITOR MODE ──
const EDITOR_PWD = 'toto';
let isEditor = false;
function toggleEditorMode() {
  if (isEditor) { isEditor=false; applyMode(); }
  else { document.getElementById('pwd-modal').style.display='flex'; document.getElementById('pwd-err').textContent=''; document.getElementById('pwd-input').value=''; setTimeout(()=>document.getElementById('pwd-input').focus(),50); }
}
function checkPassword() {
  if (document.getElementById('pwd-input').value === EDITOR_PWD) { isEditor=true; closeModal(); applyMode(); }
  else { document.getElementById('pwd-err').textContent='❌ Mot de passe incorrect'; document.getElementById('pwd-input').value=''; document.getElementById('pwd-input').focus(); }
}
function closeModal() { document.getElementById('pwd-modal').style.display='none'; }
function applyMode() {
  const badge=document.getElementById('mode-badge'), toggle=document.getElementById('btn-mode-toggle');
  if (isEditor) { document.body.classList.remove('reader-mode'); badge.className='mode-badge editor'; badge.textContent='✏️ Éditeur'; toggle.textContent='🔒 Verrouiller'; }
  else { document.body.classList.add('reader-mode'); badge.className='mode-badge reader'; badge.textContent='👁 Lecture seule'; toggle.textContent='🔓 Mode éditeur'; }
}

// ── EXPORT / IMPORT ──
function exportData() {
  collectDOM();
  const blob = new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`roland-garros-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(!data.years||!Array.isArray(data.years)) throw new Error('Format invalide');
      ST=data; localStorage.setItem(SK,JSON.stringify(ST));
      curY=ST.years.length?ST.years[ST.years.length-1].id:null; curG='men';
      renderAll(); alert(`✅ Import réussi — ${ST.years.length} année(s).`);
    } catch(err) { alert('❌ Fichier invalide : '+err.message); }
  };
  reader.readAsText(file); e.target.value='';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── INIT ──
applyMode();
if (ST.years.length) curY = ST.years[ST.years.length-1].id;
renderAll();
</script>
